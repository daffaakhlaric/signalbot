<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Sniper View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B0F14;
  --card-bg: #111827;
  --border: rgba(255,255,255,0.06);
  --text: #e2e8f0;
  --muted: #64748b;
  --gold: #FACC15;
  --green: #00FFA3;
  --red: #FF4D4D;
  --cyan: #06b6d4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; font-size: 12px; overflow: hidden; }

#toolbar {
  display: flex; align-items: center; gap: 12px; padding: 8px 16px;
  background: #0a0f1a; border-bottom: 1px solid var(--border);
  height: 48px; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
}
.pair-btn {
  background: var(--card-bg); border: 1px solid var(--border);
  color: var(--muted); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 11px;
}
.pair-btn.active { border-color: var(--gold); color: var(--gold); }
#pair-label { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: #fff; }
#price-label { font-size: 16px; font-weight: 700; color: var(--green); }
#bias-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 3px 8px;
  border-radius: 6px; background: rgba(0,255,163,0.1); color: var(--green);
  border: 1px solid rgba(0,255,163,0.3);
}
#mode-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 3px 8px;
  border-radius: 6px; background: rgba(250,204,21,0.1); color: var(--gold);
  border: 1px solid rgba(250,204,21,0.3);
}
#close-btn {
  margin-left: auto; background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3);
  color: var(--red); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 11px;
}
#chart-container { position: fixed; top: 48px; left: 0; right: 0; bottom: 120px; }

#signal-bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
  background: linear-gradient(to top, #0a0f1a, #0B0F14);
  border-top: 1px solid var(--border); display: flex; gap: 16px; padding: 12px 20px;
  overflow-x: auto;
}
.signal-chip {
  flex: 0 0 auto; min-width: 140px; background: var(--card-bg);
  border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px;
}
.signal-chip.LONG { border-color: rgba(0,255,163,0.4); box-shadow: 0 0 15px rgba(0,255,163,0.15); }
.signal-chip.SHORT { border-color: rgba(255,77,77,0.4); box-shadow: 0 0 15px rgba(255,77,77,0.15); }
.chip-name { font-size: 9px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
.chip-dir { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; }
.chip-dir.LONG { color: var(--green); }
.chip-dir.SHORT { color: var(--red); }
.chip-reason { font-size: 9px; color: var(--muted); margin-top: 4px; }
.chip-lvls { display: flex; gap: 8px; margin-top: 6px; font-size: 9px; }
.chip-lvl span { color: var(--muted); }
.chip-lvl b { font-weight: 700; }
.chip-lvl b.e { color: var(--gold); }
.chip-lvl b.tp { color: var(--green); }
.chip-lvl b.sl { color: var(--red); }

#fusion-card {
  flex: 0 0 auto; min-width: 200px; background: linear-gradient(135deg, #1a0f2e, #0f172a);
  border: 1px solid rgba(250,204,21,0.4); box-shadow: 0 0 25px rgba(250,204,21,0.2);
  border-radius: 12px; padding: 12px 16px;
}
#fusion-name { font-size: 10px; letter-spacing: 2px; color: var(--gold); margin-bottom: 6px; }
#fusion-dir { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; }
#fusion-dir.LONG { color: var(--green); text-shadow: 0 0 20px rgba(0,255,163,0.5); }
#fusion-dir.SHORT { color: var(--red); text-shadow: 0 0 20px rgba(255,77,77,0.5); }
#fusion-score { font-size: 10px; color: var(--gold); margin-top: 4px; }
#fusion-reasons { font-size: 9px; color: var(--muted); margin-top: 4px; }
#fusion-lvls { display: flex; gap: 10px; margin-top: 8px; }
#fusion-lvls div { text-align: center; }
#fusion-lvls span { font-size: 8px; color: var(--muted); letter-spacing: 1px; display: block; }
#fusion-lvls b { font-size: 11px; font-weight: 700; }
</style>
</head>
<body>

<div id="toolbar">
  <button class="pair-btn active" data-pair="BTCUSDT">BTC</button>
  <button class="pair-btn" data-pair="ETHUSDT">ETH</button>
  <button class="pair-btn" data-pair="SOLUSDT">SOL</button>
  <span id="pair-label">BTC-USDT</span>
  <span id="price-label">——</span>
  <span id="bias-badge">HTF: --</span>
  <span id="mode-badge">MODE: --</span>
  <button id="close-btn" onclick="window.close()">✕ CLOSE</button>
  <button id="sniper-btn" onclick="toggleSniperView()">🎯 SNIPER MODE</button>
  <button id="clear-btn" onclick="clearDrawings()">🧼 CLEAR</button>
</div>

<div id="chart-container"></div>

<div id="signal-bar">
  <div class="signal-chip" id="chip-fusion">
    <div id="fusion-name">⚡ FUSION SIGNAL</div>
    <div id="fusion-dir" class="WAIT">——</div>
    <div id="fusion-score">SCORE: --</div>
    <div id="fusion-reasons">reasons: --</div>
    <div class="chip-lvls" id="fusion-lvls">
      <div class="chip-lvl"><span>E</span><b class="e">--</b></div>
      <div class="chip-lvl"><span>TP</span><b class="tp">--</b></div>
      <div class="chip-lvl"><span>SL</span><b class="sl">--</b></div>
    </div>
  </div>

  <div class="signal-chip" id="chip-sniper">
    <div class="chip-name">⚡ SNIPER</div>
    <div class="chip-dir WAIT" id="sniper-dir">——</div>
    <div class="chip-reason" id="sniper-reason">waiting...</div>
    <div class="chip-lvls">
      <div class="chip-lvl"><span>E</span><b class="e" id="sniper-e">--</b></div>
      <div class="chip-lvl"><span>TP</span><b class="tp" id="sniper-tp">--</b></div>
      <div class="chip-lvl"><span>SL</span><b class="sl" id="sniper-sl">--</b></div>
    </div>
  </div>

  <div class="signal-chip" id="chip-multi-1">
    <div class="chip-name" id="m1-name">SIGNAL</div>
    <div class="chip-dir WAIT" id="m1-dir">——</div>
    <div class="chip-lvls">
      <div class="chip-lvl"><span>E</span><b class="e" id="m1-e">--</b></div>
      <div class="chip-lvl"><span>TP</span><b class="tp" id="m1-tp">--</b></div>
      <div class="chip-lvl"><span>SL</span><b class="sl" id="m1-sl">--</b></div>
    </div>
  </div>

  <div class="signal-chip" id="chip-multi-2">
    <div class="chip-name" id="m2-name">SIGNAL</div>
    <div class="chip-dir WAIT" id="m2-dir">——</div>
    <div class="chip-lvls">
      <div class="chip-lvl"><span>E</span><b class="e" id="m2-e">--</b></div>
      <div class="chip-lvl"><span>TP</span><b class="tp" id="m2-tp">--</b></div>
      <div class="chip-lvl"><span>SL</span><b class="sl" id="m2-sl">--</b></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
const API_URL = location.protocol === 'file:' ? 'http://localhost:3001' : location.origin;
let chart = null, candleSeries = null;
let markers = [];
let activePair = 'BTCUSDT';
let activeLines = [];
let activeZones = [];
let sniperModeOn = true;
let candleData = [];

function fmt(v) { return v == null ? '--' : Number(v).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

function initChart() {
  const container = document.getElementById('chart-container');
  chart = LightweightCharts.createChart(container, {
    layout: { background: { color: '#0B0F14' }, textColor: '#9ca3af' },
    grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
    width: container.clientWidth, height: container.clientHeight,
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    timeScale: { borderColor: 'rgba(255,255,255,0.05)', timeVisible: true },
    rightPriceScale: { borderVisible: false },
  });
  candleSeries = chart.addCandlestickSeries({
    upColor: '#00FFA3', downColor: '#FF4D4D',
    borderUpColor: '#00FFA3', borderDownColor: '#FF4D4D',
    wickUpColor: '#00FFA3', wickDownColor: '#FF4D4D',
  });
  window.addEventListener('resize', () => {
    chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
  });
}

function setMarkers(mks) {
  if (!candleSeries) return;
  candleSeries.setMarkers(mks || []);
}

function clearDrawings() {
  activeLines.forEach(function(l) { chart.removeSeries(l); });
  activeZones.forEach(function(z) {
    chart.removeSeries(z.top);
    chart.removeSeries(z.bottom);
  });
  activeLines = [];
  activeZones = [];
  markers = [];
  setMarkers([]);
}

function drawLevels(entry, tp, sl) {
  var now = Math.floor(Date.now() / 1000);
  var entryLine = chart.addLineSeries({ color: '#FACC15', lineWidth: 1, priceLineVisible: false });
  var tpLine = chart.addLineSeries({ color: '#00FFA3', lineWidth: 1, priceLineVisible: false });
  var slLine = chart.addLineSeries({ color: '#FF4D4D', lineWidth: 1, priceLineVisible: false });
  entryLine.setData([{ time: now, value: entry }]);
  tpLine.setData([{ time: now, value: tp }]);
  slLine.setData([{ time: now, value: sl }]);
  activeLines.push(entryLine, tpLine, slLine);
}

function getPivots(data, left, right) {
  left = left || 3; right = right || 3;
  var pivots = [];
  for (var i = left; i < data.length - right; i++) {
    var slice = data.slice(i - left, i + right + 1);
    var isHigh = slice.every(function(c) { return data[i].high >= c.high; });
    var isLow = slice.every(function(c) { return data[i].low <= c.low; });
    if (isHigh) pivots.push({ type: "HIGH", price: data[i].high, index: i });
    if (isLow) pivots.push({ type: "LOW", price: data[i].low, index: i });
  }
  return pivots;
}

function buildZones(candles) {
  if (!candles || candles.length < 10) return null;
  var piv = getPivots(candles, 3, 3);
  var highs = piv.filter(function(p) { return p.type === "HIGH"; }).map(function(p) { return p.price; });
  var lows = piv.filter(function(p) { return p.type === "LOW"; }).map(function(p) { return p.price; });
  if (!highs.length || !lows.length) return null;
  var resistance = Math.max.apply(null, highs.slice(-5));
  var support = Math.min.apply(null, lows.slice(-5));
  return { support: support, resistance: resistance };
}

function drawLevel(price, color, style) {
  var now = Math.floor(Date.now() / 1000);
  var l = chart.addLineSeries({ color: color, lineWidth: 1, lineStyle: style || 0, priceLineVisible: false });
  l.setData([{ time: now, value: price }]);
  activeLines.push(l);
  return l;
}

function drawZone(zone, color) {
  if (!zone || !zone.length) return;
  var now = Math.floor(Date.now() / 1000);
  var low = zone[0], high = zone[1];
  var top = chart.addLineSeries({ color: color, lineWidth: 1, priceLineVisible: false });
  var bottom = chart.addLineSeries({ color: color, lineWidth: 1, priceLineVisible: false });
  top.setData([{ time: now, value: high }]);
  bottom.setData([{ time: now, value: low }]);
  activeZones.push({ top: top, bottom: bottom });
}

function drawLiquidity(prices, color) {
  var now = Math.floor(Date.now() / 1000);
  prices.forEach(function(p) {
    var l = chart.addLineSeries({ color: color, lineWidth: 1, lineStyle: 2, priceLineVisible: false });
    l.setData([{ time: now, value: p }]);
    activeLines.push(l);
  });
}

function drawOBFVG(ob, fvg) {
  if (ob && ob.zone) drawZone(ob.zone, '#3B82F6');
  if (fvg && fvg.zone) drawZone(fvg.zone, '#a855f7');
}

function drawBOS(bos) {
  if (!bos || !bos.entry) return;
  var now = Math.floor(Date.now() / 1000);
  var line = chart.addLineSeries({ color: '#f97316', lineWidth: 2, priceLineVisible: false });
  line.setData([
    { time: now - 120, value: bos.entry },
    { time: now, value: bos.entry }
  ]);
  activeLines.push(line);
  markers.push({
    time: now,
    position: 'aboveBar',
    color: '#f97316',
    shape: 'square',
    text: 'BOS'
  });
  candleSeries.setMarkers(markers);
}

function drawSweep(sweep) {
  if (!sweep || !sweep.entry) return;
  var now = Math.floor(Date.now() / 1000);
  var line = chart.addLineSeries({ color: '#06b6d4', lineWidth: 1, lineStyle: 2, priceLineVisible: false });
  line.setData([{ time: now, value: sweep.entry }]);
  activeLines.push(line);
  markers.push({
    time: now,
    position: 'aboveBar',
    color: '#06b6d4',
    shape: 'circle',
    text: 'SWEEP 💧'
  });
  candleSeries.setMarkers(markers);
}

function drawTrap(trap) {
  if (!trap || !trap.price) return;
  var now = Math.floor(Date.now() / 1000);
  var text = trap.side === 'BULL_TRAP' ? 'BULL TRAP ⚠️' : 'BEAR TRAP ⚠️';
  var color = '#ef4444';
  var shape = trap.side === 'BULL_TRAP' ? 'arrowUp' : 'arrowDown';
  markers.push({
    time: now,
    position: 'aboveBar',
    color: color,
    shape: shape,
    text: text
  });
  candleSeries.setMarkers(markers);
}

function drawHTFZone(zone, color) {
  if (!zone) return;
  var arr = Array.isArray(zone) ? zone : [zone, zone];
  var low = arr[0], high = arr[1];
  var now = Math.floor(Date.now() / 1000);
  var top = chart.addLineSeries({ color: color || '#94a3b8', lineWidth: 2, priceLineVisible: false });
  var bot = chart.addLineSeries({ color: color || '#94a3b8', lineWidth: 2, priceLineVisible: false });
  top.setData([{ time: now, value: high }]);
  bot.setData([{ time: now, value: low }]);
  activeLines.push(top, bot);
}

function drawDCA(sig) {
  if (!sig || !sig.dca) return;
  var now = Math.floor(Date.now() / 1000);
  sig.dca.forEach(function(l) {
    var line = chart.addLineSeries({ color: '#facc15', lineWidth: 1, lineStyle: 2, priceLineVisible: false });
    line.setData([{ time: now, value: l.price }]);
    activeLines.push(line);
  });
}

function drawConfidence(sig) {
  if (!sig || !sig.confidenceScore) return;
  var color = sig.confidenceColor || '#f59e0b';
  markers.push({
    time: sig.candle ? sig.candle.time / 1000 : Math.floor(Date.now() / 1000),
    position: 'aboveBar',
    color: color,
    shape: 'circle',
    text: 'CONF ' + sig.confidenceScore
  });
  candleSeries.setMarkers(markers);
}

function drawSignalArrow(sig) {
  if (!sig || !sig.candle) return;
  if (sig.score && sig.score < 70) return;
  clearDrawings();
  markers = [{
    time: sig.candle.time / 1000,
    position: sig.type === 'LONG' ? 'belowBar' : 'aboveBar',
    color: sig.type === 'LONG' ? '#00FFA3' : '#FF4D4D',
    shape: sig.type === 'LONG' ? 'arrowUp' : 'arrowDown',
    text: sig.type + ' ' + (sig.confidence || '').toUpperCase()
  }];
  setMarkers(markers);
  if (sig.entry && sig.tp && sig.sl) {
    drawLevels(sig.entry, sig.tp, sig.sl);
  }
  if (sig.ob && sig.ob.zone) {
    drawZone(sig.ob.zone, '#3B82F6');
  }
  if (sig.fvg && sig.fvg.zone) {
    drawZone(sig.fvg.zone, '#a855f7');
  }
}

function drawSignalArrowOnly(sig) {
  if (!sig) return;
  var time = sig.candle ? sig.candle.time / 1000 : (sig.time ? sig.time / 1000 : Math.floor(Date.now() / 1000));
  markers.push({
    time: time,
    position: sig.type === 'LONG' ? 'belowBar' : 'aboveBar',
    color: sig.type === 'LONG' ? '#00FFA3' : '#FF4D4D',
    shape: sig.type === 'LONG' ? 'arrowUp' : 'arrowDown',
    text: (sig.type || '') + ' SNIPER'
  });
  candleSeries.setMarkers(markers);
}

function drawTradeLevels(sig) {
  if (sig.entry) drawLevel(sig.entry, '#FACC15');
  if (sig.tp) drawLevel(Array.isArray(sig.tp) ? sig.tp[0] : sig.tp, '#00FFA3');
  if (sig.sl) drawLevel(sig.sl, '#FF4D4D');
}

function drawChartPack(data) {
  clearDrawings();

  var candles = data.candles || candleData;
  var z = data.zones || {};
  var liq = data.liquidity || {};

  var support = z.support, resistance = z.resistance;
  if ((!support || !resistance) && candles.length) {
    var built = buildZones(candles);
    if (built) { support = built.support; resistance = built.resistance; }
  }

  if (support && resistance) {
    drawZone([support, resistance], '#334155');
  }

  if (liq.highs && liq.highs.length) drawLiquidity(liq.highs, '#06b6d4');
  if (liq.lows && liq.lows.length) drawLiquidity(liq.lows, '#06b6d4');

  drawOBFVG(data.ob, data.fvg);

  if (data.bos && data.bos.price) {
    drawLevel(data.bos.price, '#f97316');
  }

  var sig = data.signal;
  if (sig && sig.score >= 70) {
    drawSignalArrowOnly(sig);
    drawTradeLevels(sig);
  }
}

function toggleSniperView() {
  sniperModeOn = !sniperModeOn;
  chart.applyOptions({
    grid: { vertLines: { visible: !sniperModeOn }, horzLines: { visible: !sniperModeOn } },
    rightPriceScale: { borderVisible: !sniperModeOn },
    timeScale: { borderVisible: !sniperModeOn }
  });
  document.getElementById('sniper-btn').textContent = sniperModeOn ? '🎯 SNIPER MODE' : '📊 NORMAL';
}

function updateFusionUI(f) {
  if (!f) return;
  var dirEl = document.getElementById('fusion-dir');
  var scoreEl = document.getElementById('fusion-score');
  var reasonsEl = document.getElementById('fusion-reasons');
  var card = document.getElementById('chip-fusion');
  dirEl.textContent = f.type || '——';
  dirEl.className = f.type || 'WAIT';
  scoreEl.textContent = 'SCORE: ' + (f.score || 0);
  reasonsEl.textContent = 'reasons: ' + (f.reasons || []).join(', ');
  card.className = 'signal-chip ' + (f.type || '');
  var els = document.querySelectorAll('#fusion-lvls b');
  els[0].textContent = fmt(f.entry);
  els[1].textContent = fmt(f.tp);
  els[2].textContent = fmt(f.sl);
}

function updatePrice(price) {
  document.getElementById('price-label').textContent = '$' + Number(price).toLocaleString();
}

function updateBias(bias) {
  var el = document.getElementById('bias-badge');
  el.textContent = 'HTF: ' + (bias || '--');
  el.style.color = bias === 'LONG' ? 'var(--green)' : bias === 'SHORT' ? 'var(--red)' : 'var(--muted)';
}

function updateMode(mode) {
  var el = document.getElementById('mode-badge');
  el.textContent = 'MODE: ' + (mode || '--');
}

async function loadChart() {
  try {
    var r = await fetch(API_URL + '/candles?tf=15m');
    if (!r.ok) return;
    var data = await r.json();
    if (!data.candles || !data.candles.length) return;
    var cdata = data.candles.map(function(c) {
      return { time: c.time / 1000, open: c.open, high: c.high, low: c.low, close: c.close };
    });
    candleData = cdata;
    candleSeries.setData(cdata);
    chart.timeScale().fitContent();
  } catch(e) { console.log('chart load error:', e); }
}

function connect() {
  var ws = new WebSocket(
    location.protocol === 'file:' ? 'ws://localhost:3001'
    : (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host
  );
  ws.onopen = function() { console.log('ws connected'); };
  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      if (msg.type === 'snapshot') {
        // handle snapshot
      }
      if (msg.type === 'signal') {
        var d = msg.data || {};
        if (d.fusion) {
          updateFusionUI(d.fusion);
        }
        if (d.sniper) updateSniperUI(d.sniper);
        if (d.multi) {
          updateMultiUI(d.multi);
          if (d.multi.market_context) {
            updateBias(d.multi.market_context.htf_bias);
          }
        }
        if (d.decision) {
          updateMode(d.decision.market_mode);
        }
        if (msg.pair) {
          document.getElementById('pair-label').textContent = msg.pair.replace('-', '/');
        }
      }
      if (msg.type === 'market_data') {
        var pd = msg.data;
        if (pd && pd.close) updatePrice(pd.close);
        if (pd && pd.htf) updateBias(pd.htf.bias);
      }
      if (msg.type === 'price_tick') {
        var pt = msg.data || {};
        if (pt.price) updatePrice(pt.price);
        if (pt.candle && candleSeries) {
          candleSeries.update({
            time: pt.candle.time / 1000,
            open: pt.candle.open,
            high: pt.candle.high,
            low: pt.candle.low,
            close: pt.candle.close
          });
        }
      }
      if (msg.type === 'chart_pack') {
        var cp = msg.data || {};
        drawChartPack(cp);
        if (cp.candles && cp.candles.length) {
          var cdata = cp.candles.map(function(c) {
            return { time: c.time / 1000, open: c.open, high: c.high, low: c.low, close: c.close };
          });
          candleData = cdata;
          candleSeries.setData(cdata);
        }
        if (cp.signal) updateFusionUI(cp.signal);
        if (cp.market_context) {
          updateBias(cp.market_context.htf_bias);
          updateMode(cp.market_context.market_mode);
        }
      }
      if (msg.type === 'smart_money_overlay') {
        var data = msg.data || {};
        var sig = data.signal || data;
        var overlay = data.overlay || {};
        var htf = data.htf || {};
        if (!sig) return;

        if (sig.ob && sig.ob.zone) drawZone(sig.ob.zone, '#3B82F6');
        if (sig.fvg && sig.fvg.zone) drawZone(sig.fvg.zone, '#a855f7');
        if (sig.entry && sig.tp && sig.sl) {
          drawLevels(sig.entry, sig.tp, sig.sl);
        }
        if (sig.candle) {
          drawSignalArrowOnly(sig);
        }
        if (sig.confidenceScore) drawConfidence(sig);
        if (sig.dca) drawDCA(sig);
        if (overlay.bos) drawBOS(overlay.bos);
        if (overlay.sweep) drawSweep(overlay.sweep);
        if (overlay.trap) drawTrap(overlay.trap);
        if (htf.ob && htf.ob.zone) drawHTFZone(htf.ob.zone, '#64748b');
        if (htf.fvg && htf.fvg.zone) drawHTFZone(htf.fvg.zone, '#475569');
      }
      if (msg.type === 'smart_money') {
        var sm = msg.data || {};
        var sig = sm.signal;
        if (!sig) return;

        if (sig.type === 'CHOPPY') {
          markers.push({
            time: sig.candle ? sig.candle.time / 1000 : Math.floor(Date.now() / 1000),
            position: 'aboveBar',
            color: '#94a3b8',
            shape: 'circle',
            text: 'CHOPPY ⚠️'
          });
          if (sm.stats && sm.stats.volatility) {
            markers.push({
              time: sig.candle ? sig.candle.time / 1000 : Math.floor(Date.now() / 1000),
              position: 'aboveBar',
              color: '#38bdf8',
              shape: 'circle',
              text: 'VOL ' + sm.stats.volatility + '%'
            });
          }
          candleSeries.setMarkers(markers);
          return;
        }

        markers.push({
          time: sig.candle ? sig.candle.time / 1000 : Math.floor(Date.now() / 1000),
          position: sig.type === 'LONG' ? 'belowBar' : 'aboveBar',
          color: sig.type === 'LONG' ? '#00FFA3' : '#FF4D4D',
          shape: sig.type === 'LONG' ? 'arrowUp' : 'arrowDown',
          text: (sig.type || '') + ' (' + (sig.confidence || 'MED') + ')'
        });
        if (sm.stats && sm.stats.volatility) {
          markers.push({
            time: sig.candle ? sig.candle.time / 1000 : Math.floor(Date.now() / 1000),
            position: 'aboveBar',
            color: '#38bdf8',
            shape: 'circle',
            text: 'VOL ' + sm.stats.volatility + '%'
          });
        }
        if (sig.ob && sig.ob.zone) drawZone(sig.ob.zone, '#3B82F6');
        if (sig.fvg && sig.fvg.zone) drawZone(sig.fvg.zone, '#a855f7');
        candleSeries.setMarkers(markers);
      }
    } catch(e) { console.log('parse error:', e); }
  };
  ws.onclose = function() { console.log('ws closed, reconnecting...'); setTimeout(connect, 3000); };
  ws.onerror = function(e) { console.log('ws error'); };
}

initChart();
loadChart();
connect();
</script>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Apex Sniper Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase-config.js"></script>
<style>
:root {
  --bg:      #0B0F14;
  --card:    #121821;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text:    #e2e8f0;
  --muted:   #64748b;
  --green:   #00FFA3;
  --red:     #FF4D4D;
  --blue:    #3B82F6;
  --gold:    #FACC15;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(0,255,163,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.05) 0%, transparent 50%);
}
.wrap {
  width: 100%;
  max-width: 440px;
  padding: 24px 16px;
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 3px;
  color: var(--green);
  text-shadow: 0 0 20px rgba(0,255,163,0.4);
}
.logo-sub {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-top: 4px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
}
.card-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}
.card-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
}
.form-group {
  margin-bottom: 18px;
}
label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}
input[type="email"],
input[type="password"],
input[type="text"],
input[type="tel"] {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
input:focus {
  border-color: rgba(0,255,163,0.4);
  box-shadow: 0 0 0 3px rgba(0,255,163,0.08);
}
input::placeholder { color: var(--muted); }
.btn {
  width: 100%;
  padding: 13px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.btn-primary {
  background: var(--green);
  color: #000;
  margin-top: 8px;
}
.btn-primary:hover { background: #00e694; box-shadow: 0 0 20px rgba(0,255,163,0.3); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0;
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 12px; color: var(--muted); }
.link-row {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  margin-top: 20px;
}
.link-row a {
  color: var(--green);
  text-decoration: none;
  font-weight: 600;
}
.link-row a:hover { text-decoration: underline; }
.alert {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 18px;
  display: none;
  line-height: 1.5;
}
.alert-error   { background: rgba(255,77,77,0.1);   border: 1px solid rgba(255,77,77,0.3);   color: #ff7070; }
.alert-success { background: rgba(0,255,163,0.08); border: 1px solid rgba(0,255,163,0.25); color: var(--green); }
.alert-warn    { background: rgba(250,204,21,0.08); border: 1px solid rgba(250,204,21,0.25); color: var(--gold); }
.alert.show { display: block; }
.badge-pending {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: rgba(250,204,21,0.1);
  border: 1px solid rgba(250,204,21,0.3);
  border-radius: 20px;
  font-size: 11px;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 16px;
}
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(0,0,0,0.3);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-title">APEX SNIPER</div>
    <div class="logo-sub">SIGNAL TERMINAL · MEMBER ACCESS</div>
  </div>

  <div class="card">
    <div class="card-title">Masuk ke Akun</div>
    <div class="card-sub">Akses eksklusif signal trading BTC/USDT real-time</div>

    <div id="alert" class="alert"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">
        Masuk
      </button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">BELUM PUNYA AKUN?</div>
      <div class="divider-line"></div>
    </div>

    <div class="link-row">
      <a href="/register.html">Daftar sebagai Member</a>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

function showAlert(type, msg) {
  const el = document.getElementById('alert');
  el.className = `alert alert-${type} show`;
  el.innerHTML = msg;
}

async function handleLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Memproses...';

  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    if (error) throw error;

    // Cek profil user
    const { data: profile, error: pErr } = await db
      .from('profiles')
      .select('role, is_verified, rejected, reject_reason')
      .eq('id', data.user.id)
      .single();

    if (pErr) throw new Error('Gagal memuat profil. Hubungi admin.');

    if (profile.rejected) {
      await db.auth.signOut();
      showAlert('error', `❌ Akun ditolak.<br><small>${profile.reject_reason || 'Hubungi admin untuk informasi lebih lanjut.'}</small>`);
      return;
    }

    if (!profile.is_verified && profile.role !== 'admin') {
      await db.auth.signOut();
      showAlert('warn', '⏳ <strong>Akun belum diverifikasi.</strong><br>Admin sedang memproses pendaftaran kamu. Sabar ya!');
      return;
    }

    // Redirect sesuai role
    if (profile.role === 'admin') {
      window.location.href = '/admin.html';
    } else {
      window.location.href = '/index.html';
    }

  } catch (err) {
    const msg = err.message || 'Login gagal';
    if (msg.includes('Invalid login credentials')) {
      showAlert('error', '❌ Email atau password salah.');
    } else {
      showAlert('error', '❌ ' + msg);
    }
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Masuk';
  }
}

// Kalau sudah login, langsung redirect
(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    const { data: profile } = await db
      .from('profiles')
      .select('role, is_verified')
      .eq('id', session.user.id)
      .single();
    if (profile?.role === 'admin') { window.location.href = '/admin.html'; return; }
    if (profile?.is_verified) { window.location.href = '/index.html'; return; }
  }
})();
</script>
</body>
</html>
